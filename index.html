<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="description" content="NEON PULSE — High-tech cyberpunk arcade. Dodge firewalls, collect data shards, master quantum phase shifts." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>NEON PULSE</title>
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e1a; touch-action: none; -webkit-tap-highlight-color: transparent; }
      #game-container { width: 100%; height: 100%; position: relative; overflow: hidden; }
      #game-container canvas {
        display: block; position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0;
        pointer-events: none;
      }
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    </style>
  </head>
  <body>
    <div id="game-container" role="application" aria-label="NEON PULSE game">
      <span class="sr-only" id="live-region" aria-live="polite"></span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
