<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="description" content="NEON PULSE — cyberpunk lane runner for YouTube Playables." />
    <title>NEON PULSE</title>
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <!-- YouTube Playables: load the official SDK here BEFORE game code (URL from developer portal). -->
    <!-- <script src="PLAYABLES_SDK_URL_FROM_PORTAL"></script> -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100%; overflow: hidden; background: #0a0e1a; touch-action: none;
        -webkit-tap-highlight-color: transparent;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #game-container { width: 100%; height: 100%; position: relative; overflow: hidden; }
      #game-container canvas {
        display: block; position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0;
        pointer-events: none;
      }
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    </style>
  </head>
  <body>
    <div id="game-container" role="application" aria-label="NEON PULSE game">
      <span class="sr-only" id="live-region" aria-live="polite"></span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
